<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <meta name="theme-color" content="#0f1117"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="VenkatS AI HiLO"/>
  <title>VenkatS AI HiLO — Smart AI Assistant</title>
  <meta name="description" content="VenkatS AI HiLO — Free smart AI that auto-selects the best model for your question. No signup, no API key."/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:      #0f1117; --sidebar: #090b10; --surface: #181c27; --surf2: #1e2333; --border: #2a2f42;
    --accent: #6366f1; --accent2: #4f52d4; --accent3: #818cf8;
    --grad: linear-gradient(135deg,#6366f1,#a855f7,#ec4899);
    --text: #e8eaf6; --text2: #8b8fa8; --text3: #4b4f6b;
    --green: #34d399; --yellow: #fbbf24; --red: #f87171;
    --font: 'Inter','Segoe UI',system-ui,sans-serif;
    --mono: 'Cascadia Code','Fira Code',Consolas,monospace;
    --safe-t: env(safe-area-inset-top,0px); --safe-b: env(safe-area-inset-bottom,0px);
  }
  [data-theme="light"] {
    --bg: #f8f9fc; --sidebar: #eef0f7; --surface: #ffffff; --surf2: #f0f2fa; --border: #d1d5e8;
    --text: #1a1b2e; --text2: #5c5f7a; --text3: #9a9db8;
  }
  html,body { height:100%; overflow:hidden; }
  body { font-family:var(--font); background:var(--bg); color:var(--text); display:flex; padding-top:var(--safe-t); padding-left:env(safe-area-inset-left,0px); padding-right:env(safe-area-inset-right,0px); transition:background .2s,color .2s; }
  ::-webkit-scrollbar{width:4px;height:4px} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

  /* ── Overlay ── */
  #overlay { display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.6);backdrop-filter:blur(3px); }
  #overlay.show { display:block; }

  /* ── Sidebar ── */
  #sidebar { width:272px;min-width:272px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100%;z-index:300;transition:transform .28s cubic-bezier(.4,0,.2,1); }
  .sidebar-top { padding:18px 14px 12px;border-bottom:1px solid var(--border);flex-shrink:0; }
  .logo-row { display:flex;align-items:center;justify-content:space-between;margin-bottom:14px; }
  .logo { display:flex;align-items:center;gap:10px; }
  .logo-mark { width:40px;height:40px;border-radius:12px;flex-shrink:0;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#fff;box-shadow:0 4px 16px rgba(99,102,241,.45);letter-spacing:-1px; }
  .logo-info { display:flex;flex-direction:column;gap:1px; }
  .logo-name { font-size:15px;font-weight:900;color:var(--text);letter-spacing:-.4px;line-height:1.2; }
  .logo-name .brand { background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent; }
  .logo-sub { font-size:10px;color:var(--text3);font-weight:600;letter-spacing:.5px;text-transform:uppercase; }
  #close-sidebar { display:none;background:none;border:1px solid var(--border);border-radius:7px;padding:6px 9px;color:var(--text2);cursor:pointer; }
  #close-sidebar svg { width:15px;height:15px;display:block; }
  .btn-new { width:100%;padding:10px 13px;background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.25);border-radius:9px;color:var(--accent3);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);display:flex;align-items:center;gap:8px;transition:all .15s; }
  .btn-new:hover,.btn-new:active { background:rgba(99,102,241,.22);border-color:var(--accent);color:#fff; }
  .btn-new svg { width:14px;height:14px;flex-shrink:0; }
  .sidebar-list { padding:8px;flex:1;overflow-y:auto;min-height:0; }
  .sidebar-label { font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.7px;text-transform:uppercase;padding:6px 8px 5px; }
  .chat-item { padding:9px 10px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--text2);display:flex;align-items:center;gap:6px;transition:all .15s;margin-bottom:2px;min-height:42px; }
  .chat-item:hover,.chat-item:active { background:var(--surf2);color:var(--text); }
  .chat-item.active { background:rgba(99,102,241,.12);color:var(--text);border-left:2px solid var(--accent);padding-left:8px; }
  .chat-item-title { flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }
  .chat-del { display:none;background:none;border:none;color:var(--text3);cursor:pointer;padding:3px 6px;border-radius:4px;font-size:13px; }
  .chat-item:hover .chat-del { display:block; }
  .chat-del:hover { color:var(--red);background:rgba(248,113,113,.1); }
  .sidebar-bottom { padding:12px 10px 14px;border-top:1px solid var(--border);flex-shrink:0; }
  .auto-badge { display:flex;align-items:center;gap:7px;background:rgba(99,102,241,.08);border:1px solid rgba(99,102,241,.2);border-radius:9px;padding:9px 12px;margin-bottom:10px; }
  .auto-dot { width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 2s infinite;flex-shrink:0; }
  .auto-text { font-size:12px;color:var(--text2);font-weight:600; }
  .auto-model-name { font-size:11px;color:var(--accent3);font-weight:700;margin-left:auto; }
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
  .made-by { text-align:center;font-size:11px;color:var(--text3);padding-top:8px; }
  .made-by span { background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:700; }

  /* ── Main ── */
  #main { flex:1;display:flex;flex-direction:column;height:100%;overflow:hidden;min-width:0; }
  #chat-header { padding:12px 18px;border-bottom:1px solid var(--border);background:var(--bg);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-shrink:0;min-height:56px; }
  .header-left { display:flex;align-items:center;gap:10px;min-width:0;flex:1; }
  #menu-btn { display:none;background:none;border:1px solid var(--border);border-radius:8px;padding:7px 9px;color:var(--text2);cursor:pointer;flex-shrink:0; }
  #menu-btn svg { width:16px;height:16px;display:block; }
  .header-dot { width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);flex-shrink:0;animation:pulse 2s infinite; }
  .chat-title { font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1; }
  .mode-chip { font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap;border:1px solid;transition:all .3s; }
  .header-right { display:flex;align-items:center;gap:6px;flex-shrink:0; }
  .btn-hdr { background:none;border:1px solid var(--border);border-radius:7px;color:var(--text2);padding:7px 10px;cursor:pointer;font-size:12px;font-family:var(--font);display:flex;align-items:center;gap:4px;transition:all .15s;min-height:34px; }
  .btn-hdr:hover,.btn-hdr:active { background:var(--surf2);color:var(--text);border-color:var(--accent); }
  .btn-hdr svg { width:13px;height:13px; }

  /* ── Messages ── */
  #messages { flex:1;overflow-y:auto;overflow-x:hidden;padding:20px 20px 8px;display:flex;flex-direction:column;gap:0;scroll-behavior:smooth;-webkit-overflow-scrolling:touch; }
  .msg-row { display:flex;gap:12px;padding:14px 0;align-items:flex-start; }
  .msg-row + .msg-row { border-top:1px solid rgba(255,255,255,.04); }
  [data-theme="light"] .msg-row + .msg-row { border-top:1px solid rgba(0,0,0,.06); }
  .msg-avatar { width:34px;height:34px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;margin-top:1px; }
  .msg-avatar.user { background:var(--grad);color:#fff;box-shadow:0 2px 8px rgba(99,102,241,.3); }
  .msg-avatar.ai { background:linear-gradient(135deg,#1e2333,#2a2f42);border:1px solid var(--border);font-size:18px; }
  [data-theme="light"] .msg-avatar.ai { background:linear-gradient(135deg,#e8eaf6,#d1d5e8); }
  .msg-content { flex:1;min-width:0; }
  .msg-meta { display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap; }
  .msg-name { font-size:13px;font-weight:700; }
  .msg-name.user { color:var(--accent3); }
  .msg-name.ai { background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent; }
  .msg-model-badge { font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;background:rgba(99,102,241,.1);color:var(--accent3);border:1px solid rgba(99,102,241,.2); }
  .msg-body { color:var(--text);line-height:1.78;font-size:15px;word-break:break-word; }
  .msg-body p{margin-bottom:10px} .msg-body p:last-child{margin-bottom:0}
  .msg-body ul,.msg-body ol{margin:6px 0 10px 20px} .msg-body li{margin-bottom:4px}
  .msg-body h1,.msg-body h2,.msg-body h3{margin:16px 0 7px;font-weight:700}
  .msg-body h1{font-size:20px} .msg-body h2{font-size:17px} .msg-body h3{font-size:15px;color:var(--text2)}
  .msg-body strong{font-weight:700;color:var(--text)} .msg-body em{color:var(--text2)}
  .msg-body blockquote{border-left:3px solid var(--accent);padding-left:13px;margin:10px 0;color:var(--text2)}
  .msg-body a{color:var(--accent3)} .msg-body hr{border:none;border-top:1px solid var(--border);margin:14px 0}
  .msg-body table{border-collapse:collapse;width:100%;margin:12px 0;font-size:12px;display:block;overflow-x:auto}
  .msg-body th,.msg-body td{border:1px solid var(--border);padding:8px 10px;text-align:left;white-space:nowrap}
  .msg-body th{background:var(--surf2);font-weight:600;color:var(--text2)}
  .msg-body code:not(pre code){background:rgba(99,102,241,.15);color:#a5b4fc;padding:2px 6px;border-radius:5px;font-family:var(--mono);font-size:13px}

  /* code block */
  .code-block{background:#0a0c14;border:1px solid var(--border);border-radius:10px;margin:10px 0;overflow:hidden}
  .code-header{display:flex;align-items:center;justify-content:space-between;padding:8px 13px;background:rgba(255,255,255,.03);border-bottom:1px solid var(--border)}
  .code-lang{font-size:11px;font-weight:700;color:var(--accent3);text-transform:uppercase;letter-spacing:.6px}
  .btn-copy{background:none;border:1px solid var(--border);border-radius:5px;color:var(--text3);font-size:11px;padding:4px 10px;cursor:pointer;font-family:var(--font);display:flex;align-items:center;gap:4px;font-weight:600;min-height:28px;transition:all .15s}
  .btn-copy.copied{color:var(--green);border-color:var(--green)}
  .code-block pre{margin:0;padding:14px;overflow-x:auto;font-family:var(--mono);font-size:13px;line-height:1.65;-webkit-overflow-scrolling:touch}

  /* quick actions */
  .msg-actions { display:flex;flex-wrap:wrap;gap:6px;margin-top:10px; }
  .action-btn { background:var(--surf2);border:1px solid var(--border);border-radius:7px;color:var(--text2);font-size:11px;font-weight:600;padding:5px 10px;cursor:pointer;font-family:var(--font);transition:all .15s;display:flex;align-items:center;gap:4px; }
  .action-btn:hover,.action-btn:active { background:rgba(99,102,241,.12);border-color:var(--accent);color:var(--accent3); }

  /* typing */
  .typing-indicator{display:flex;gap:5px;align-items:center;padding:4px 0}
  .typing-indicator span{width:7px;height:7px;background:var(--accent);border-radius:50%;animation:bounce 1.3s ease-in-out infinite;opacity:.5}
  .typing-indicator span:nth-child(2){animation-delay:.18s} .typing-indicator span:nth-child(3){animation-delay:.36s}
  @keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-8px);opacity:1}}
  .thinking-label{font-size:12px;color:var(--text3);margin-left:8px;animation:fadeIn .5s ease}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}

  /* welcome */
  #welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px;text-align:center}
  .welcome-mark{width:80px;height:80px;border-radius:22px;margin:0 auto 18px;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:900;color:#fff;box-shadow:0 12px 40px rgba(99,102,241,.45)}
  #welcome h1{font-size:26px;font-weight:900;letter-spacing:-.4px;margin-bottom:6px;line-height:1.2}
  #welcome h1 .brand{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .hilo-tag{display:inline-block;background:var(--grad);color:#fff;font-size:11px;font-weight:800;padding:2px 10px;border-radius:20px;margin-bottom:8px;letter-spacing:1px}
  #welcome .tagline{color:var(--text2);max-width:460px;line-height:1.7;margin-bottom:14px;font-size:14px}
  .chips{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:22px}
  .chip{background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.2);color:var(--accent3);font-size:11px;font-weight:600;padding:4px 11px;border-radius:20px}
  .chip.g{background:rgba(52,211,153,.08);border-color:rgba(52,211,153,.2);color:var(--green)}
  .chip.y{background:rgba(251,191,36,.08);border-color:rgba(251,191,36,.2);color:var(--yellow)}
  .suggestions{display:grid;grid-template-columns:1fr 1fr;gap:9px;width:100%;max-width:560px}
  .suggestion{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px 14px;text-align:left;cursor:pointer;transition:all .18s;-webkit-tap-highlight-color:transparent}
  .suggestion:hover,.suggestion:active{background:var(--surf2);border-color:var(--accent);transform:translateY(-2px)}
  .sug-icon{font-size:20px;margin-bottom:7px} .sug-title{font-size:13px;font-weight:700;margin-bottom:3px} .sug-desc{font-size:12px;color:var(--text2);line-height:1.4}

  /* input */
  #input-area{padding:10px 16px;padding-bottom:calc(10px + var(--safe-b));border-top:1px solid var(--border);background:var(--bg);flex-shrink:0}
  .mode-bar{display:flex;align-items:center;gap:6px;padding:5px 4px;margin-bottom:6px;min-height:24px}
  .mode-bar-label{font-size:11px;color:var(--text3);font-weight:600}
  .mode-indicator{font-size:11px;font-weight:700;padding:2px 9px;border-radius:12px;border:1px solid;transition:all .3s}
  .mode-auto-text{font-size:11px;color:var(--text3);margin-left:auto}
  .input-wrapper{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;transition:border-color .2s,box-shadow .2s;overflow:hidden}
  .input-wrapper:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,.1)}
  #user-input{width:100%;padding:13px 14px;background:transparent;border:none;outline:none;color:var(--text);font-size:16px;font-family:var(--font);resize:none;max-height:160px;min-height:50px;line-height:1.55;-webkit-appearance:none}
  #user-input::placeholder{color:var(--text3)}
  .input-footer{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-top:1px solid var(--border);background:rgba(255,255,255,.01)}
  .input-footer-left{display:flex;align-items:center;gap:8px}
  .btn-voice{background:none;border:1px solid var(--border);border-radius:7px;color:var(--text2);padding:6px 9px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
  .btn-voice:hover{border-color:var(--accent);color:var(--accent3)}
  .btn-voice.listening{border-color:var(--red);color:var(--red);animation:voicePulse 1s infinite}
  @keyframes voicePulse{0%,100%{opacity:1}50%{opacity:.5}}
  .btn-voice svg{width:14px;height:14px}
  .char-count{font-size:11px;color:var(--text3)}
  #send-btn{background:var(--grad);color:#fff;border:none;border-radius:9px;padding:9px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);display:flex;align-items:center;gap:6px;transition:all .15s;box-shadow:0 3px 12px rgba(99,102,241,.3);min-height:38px;-webkit-tap-highlight-color:transparent}
  #send-btn:active:not(:disabled){opacity:.85;transform:scale(.97)}
  #send-btn:disabled{background:var(--surf2);color:var(--text3);cursor:not-allowed;box-shadow:none}
  #send-btn svg{width:14px;height:14px}

  /* toast */
  #toast{position:fixed;bottom:calc(20px + var(--safe-b));left:50%;transform:translateX(-50%) translateY(80px);z-index:999;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 18px;font-size:13px;box-shadow:0 8px 30px rgba(0,0,0,.4);opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;max-width:calc(100vw - 32px);text-align:center}
  #toast.show{transform:translateX(-50%) translateY(0);opacity:1}
  #toast.error{border-color:var(--red);color:#fca5a5}
  #toast.success{border-color:var(--green);color:var(--green)}

  /* responsive */
  @media(max-width:680px){
    body{display:block;position:fixed;inset:0}
    #sidebar{position:fixed;top:0;left:0;bottom:0;transform:translateX(-100%);z-index:300;padding-top:var(--safe-t)}
    #sidebar.open{transform:translateX(0);box-shadow:4px 0 24px rgba(0,0,0,.5)}
    #close-sidebar{display:flex;align-items:center;justify-content:center}
    #main{position:fixed;inset:0;padding-top:var(--safe-t);display:flex;flex-direction:column}
    #menu-btn{display:flex;align-items:center;justify-content:center}
    .mode-chip{display:none}
    #messages{padding:14px 14px 6px}
    .msg-body{font-size:14px}
    #welcome{padding:20px 14px;justify-content:flex-start;padding-top:24px}
    #welcome h1{font-size:21px}
    .welcome-mark{width:62px;height:62px;font-size:28px}
    .suggestions{grid-template-columns:1fr}
    #input-area{padding:8px 12px;padding-bottom:calc(8px + var(--safe-b))}
    .input-hint{display:none}
  }
  @media(max-width:380px){#welcome h1{font-size:18px}.msg-body{font-size:13px}}
  </style>
</head>
<body>

<div id="overlay" onclick="closeSidebar()"></div>

<!-- ══ SIDEBAR ══ -->
<nav id="sidebar">
  <div class="sidebar-top">
    <div class="logo-row">
      <div class="logo">
        <div class="logo-mark">V</div>
        <div class="logo-info">
          <div class="logo-name"><span class="brand">VenkatS AI</span></div>
          <div class="logo-sub">HiLO · Free · Smart · No Signup</div>
        </div>
      </div>
      <button id="close-sidebar" onclick="closeSidebar()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <button class="btn-new" onclick="newConversation()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New conversation
    </button>
  </div>
  <div class="sidebar-list">
    <div class="sidebar-label">Recent chats</div>
    <div id="chat-list"></div>
  </div>
  <div class="sidebar-bottom">
    <div class="auto-badge">
      <div class="auto-dot"></div>
      <span class="auto-text">Auto Model</span>
      <span class="auto-model-name" id="sidebar-model-name">GPT-4o mini</span>
    </div>
    <div class="made-by">Built by <span>VenkatS</span> · HiLO Engine</div>
  </div>
</nav>

<!-- ══ MAIN ══ -->
<main id="main">
  <div id="chat-header">
    <div class="header-left">
      <button id="menu-btn" onclick="openSidebar()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="header-dot"></div>
      <span class="chat-title" id="chat-title">New Conversation</span>
    </div>
    <div class="header-right">
      <span class="mode-chip" id="mode-chip" style="background:rgba(99,102,241,.1);color:var(--accent3);border-color:rgba(99,102,241,.25)">⚡ Auto Mode</span>
      <button class="btn-hdr" onclick="toggleTheme()" title="Toggle theme">
        <svg id="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
      <button class="btn-hdr" onclick="exportChat()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </button>
      <button class="btn-hdr" onclick="clearCurrentChat()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
      </button>
    </div>
  </div>

  <div id="messages"></div>

  <div id="input-area">
    <div class="mode-bar">
      <span class="mode-bar-label">🤖 Mode:</span>
      <span class="mode-indicator" id="mode-indicator" style="background:rgba(99,102,241,.1);color:var(--accent3);border-color:rgba(99,102,241,.25)">Auto-detecting…</span>
      <span class="mode-auto-text" id="mode-auto-text">Type to auto-select model</span>
    </div>
    <div class="input-wrapper">
      <textarea id="user-input" placeholder="Ask VenkatS AI HiLO anything…" rows="1"
        onkeydown="handleKey(event)" oninput="handleInput(this)"></textarea>
      <div class="input-footer">
        <div class="input-footer-left">
          <button class="btn-voice" id="voice-btn" onclick="toggleVoice()" title="Voice input">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
          </button>
          <span class="char-count" id="char-count">0</span>
        </div>
        <button id="send-btn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          Send
        </button>
      </div>
    </div>
  </div>
</main>

<div id="toast"></div>

<script>
/* ═══════════════ SYSTEM ═══════════════ */
const SYSTEM = `You are VenkatS AI HiLO — a highly intelligent, friendly AI assistant created by VenkatS. "HiLO" means you can handle both High-complexity and Low-complexity tasks equally well.

You specialize in:
- Writing perfect, production-ready code in any language
- Debugging and fixing errors with clear explanations
- Explaining complex topics in simple, clear language
- Code reviews, architecture, system design
- Math, reasoning, data analysis
- Creative writing, brainstorming, and general knowledge

Core rules:
- ALWAYS wrap code in fenced markdown blocks with language (e.g. \`\`\`python)
- Think step by step for complex problems
- Be concise but complete — no unnecessary padding
- Be warm, encouraging and professional
- Sign responses with personality when appropriate`;

const API_GET    = 'https://text.pollinations.ai/';
const API_OPENAI = 'https://text.pollinations.ai/openai';

/* ═══════════════ AUTO MODEL DETECTION ═══════════════ */
const MODELS = {
  'openai':        { label:'⚡ GPT-4o mini',   color:'rgba(99,102,241,.1)',  border:'rgba(99,102,241,.3)',  text:'var(--accent3)' },
  'openai-large':  { label:'🤖 GPT-4o',        color:'rgba(168,85,247,.1)', border:'rgba(168,85,247,.3)', text:'#c084fc' },
  'llama':         { label:'🦙 Llama 70B',     color:'rgba(52,211,153,.08)',border:'rgba(52,211,153,.3)', text:'var(--green)' },
  'mistral-large': { label:'🌊 Mistral Large', color:'rgba(251,191,36,.08)',border:'rgba(251,191,36,.3)', text:'var(--yellow)' },
  'mistral':       { label:'✨ Mistral',        color:'rgba(99,102,241,.1)', border:'rgba(99,102,241,.3)', text:'var(--accent3)' },
  'llamalight':    { label:'🚀 Llama 8B',      color:'rgba(52,211,153,.05)',border:'rgba(52,211,153,.2)', text:'var(--green)' },
};

function detectModel(text) {
  const t = text.toLowerCase().trim();
  const words = t.split(/\s+/).length;

  // Code / technical
  if (/\b(code|function|bug|debug|error|fix|script|python|javascript|typescript|java|c\+\+|c#|php|ruby|go|rust|html|css|sql|database|api|algorithm|program|class|method|array|loop|npm|git|deploy|server|backend|frontend|react|vue|angular|node|express|django|flask|spring|kubernetes|docker|aws|json|xml|regex|query|index|schema|migration|endpoint|hook|component|import|export|async|await|promise|callback)\b/.test(t)) {
    return { model:'llama', why:'Code detected → Llama 70B (best for code)' };
  }
  // Math / reasoning / analysis
  if (/\b(calculate|math|equation|solve|proof|theorem|formula|integral|derivative|statistic|probability|logic|reasoning|complexity|optimization|graph|tree|sort|binary|matrix|vector|linear|quadratic|percentage|average|median|variance)\b/.test(t)) {
    return { model:'openai-large', why:'Math/logic detected → GPT-4o (best reasoning)' };
  }
  // Creative writing / long-form
  if (/\b(write|story|poem|essay|blog|article|creative|fiction|narrative|describe|imagine|novel|script|lyrics|speech|draft|rewrite|paraphrase|summarize|translate|cover letter|resume)\b/.test(t)) {
    return { model:'openai-large', why:'Creative writing → GPT-4o (best quality)' };
  }
  // Research / deep analysis
  if (/\b(explain|analyze|analysis|compare|difference|research|study|understand|opinion|pros|cons|advantage|disadvantage|review|evaluate|assess|deep dive|detailed|comprehensive)\b/.test(t)) {
    return { model:'openai', why:'Analysis → GPT-4o mini (balanced)' };
  }
  // Short/quick question → fastest model
  if (words <= 6 || /^(hi|hey|hello|what is|who is|when|where|how many|define|meaning of|what are)\b/.test(t)) {
    return { model:'llamalight', why:'Quick question → Llama 8B (fastest)' };
  }
  // Conversational / general
  return { model:'openai', why:'General → GPT-4o mini (best balance)' };
}

function updateModeUI(model, why) {
  const m = MODELS[model] || MODELS['openai'];
  const chip = document.getElementById('mode-chip');
  const ind  = document.getElementById('mode-indicator');
  const auto = document.getElementById('mode-auto-text');
  const side = document.getElementById('sidebar-model-name');
  if (chip) { chip.textContent = m.label; chip.style.cssText = `background:${m.color};color:${m.text};border-color:${m.border}`; }
  if (ind)  { ind.textContent  = m.label; ind.style.cssText  = `background:${m.color};color:${m.text};border-color:${m.border}`; }
  if (auto) auto.textContent = why || 'Auto-selected';
  if (side) side.textContent = m.label;
}

/* ═══════════════ STATE ═══════════════ */
let S = { currentModel:'openai', theme:'dark', userName:'You', conversations:{}, currentId:null, streaming:false };
const save = () => { try { localStorage.setItem('vhilo',JSON.stringify({...S,streaming:false})); }catch(e){} };
const load = () => { try { const r=localStorage.getItem('vhilo'); if(r) Object.assign(S,JSON.parse(r)); S.streaming=false; }catch(e){} };

load();
document.documentElement.setAttribute('data-theme', S.theme||'dark');
updateModeUI(S.currentModel||'openai');
renderList();
if (S.currentId && S.conversations[S.currentId]) loadConv(S.currentId);
else renderMessages();

/* ═══════════════ THEME ═══════════════ */
function toggleTheme() {
  S.theme = S.theme==='dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', S.theme);
  save(); showToast(S.theme==='dark'?'Dark mode 🌙':'Light mode ☀️','success');
}

/* ═══════════════ SIDEBAR ═══════════════ */
function openSidebar()  { document.getElementById('sidebar').classList.add('open'); document.getElementById('overlay').classList.add('show'); }
function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('show'); }

/* ═══════════════ CONVERSATIONS ═══════════════ */
function newConversation() {
  const id='c'+Date.now();
  S.conversations[id]={title:'New Conversation',messages:[]};
  S.currentId=id; save(); renderList(); renderMessages();
  document.getElementById('chat-title').textContent='New Conversation';
  closeSidebar(); setTimeout(()=>document.getElementById('user-input').focus(),100);
}
function loadConv(id) {
  S.currentId=id; save(); renderList(); renderMessages();
  document.getElementById('chat-title').textContent=S.conversations[id]?.title||'Conversation';
  closeSidebar();
}
function delConv(id,e) {
  e.stopPropagation();
  if(!confirm('Delete this conversation?')) return;
  delete S.conversations[id];
  if(S.currentId===id){S.currentId=null;renderMessages();document.getElementById('chat-title').textContent='New Conversation';}
  save(); renderList();
}
function clearCurrentChat() {
  if(!S.currentId||!confirm('Clear conversation?')) return;
  S.conversations[S.currentId].messages=[]; save(); renderMessages();
}
function renderList() {
  const el=document.getElementById('chat-list');
  const cs=Object.entries(S.conversations).reverse();
  if(!cs.length){el.innerHTML='<div style="padding:10px;font-size:12px;color:var(--text3)">No chats yet — start one!</div>';return;}
  el.innerHTML=cs.map(([id,c])=>`<div class="chat-item ${id===S.currentId?'active':''}" onclick="loadConv('${id}')"><span class="chat-item-title">${esc(c.title)}</span><button class="chat-del" onclick="delConv('${id}',event)">✕</button></div>`).join('');
}

/* ═══════════════ RENDER ═══════════════ */
function renderMessages() {
  const el=document.getElementById('messages');
  const conv=S.currentId&&S.conversations[S.currentId];
  if(!conv||!conv.messages.length){el.innerHTML=welcomeHTML();return;}
  el.innerHTML=conv.messages.map(buildMsg).join('');
  el.scrollTop=el.scrollHeight;
  el.querySelectorAll('pre code').forEach(b=>hljs.highlightElement(b));
}
function welcomeHTML(){return`<div id="welcome">
  <div class="welcome-mark">V</div>
  <div class="hilo-tag">HiLO ENGINE</div>
  <h1>Hi, I'm <span class="brand">VenkatS AI</span> 👋</h1>
  <p class="tagline">I <strong>auto-select the best AI model</strong> for every question — no manual switching needed. Code, math, creative writing, or just chat.</p>
  <div class="chips">
    <span class="chip g">✦ 100% Free</span><span class="chip">No API Key</span><span class="chip">No Signup</span>
    <span class="chip y">🧠 Auto Model Selection</span><span class="chip g">🎙️ Voice Input</span><span class="chip">🌙 Dark/Light Mode</span>
  </div>
  <div class="suggestions">
    <div class="suggestion" onclick="useSuggestion('Write a Python function to fetch data from a REST API and save it as JSON')"><div class="sug-icon">🐍</div><div class="sug-title">Python code</div><div class="sug-desc">Auto-uses Llama 70B</div></div>
    <div class="suggestion" onclick="useSuggestion('Explain async/await in JavaScript with a real-world example')"><div class="sug-icon">⚡</div><div class="sug-title">JavaScript</div><div class="sug-desc">Auto-uses Llama 70B</div></div>
    <div class="suggestion" onclick="useSuggestion('Write a creative short story about an AI that helps humans')"><div class="sug-icon">✍️</div><div class="sug-title">Creative writing</div><div class="sug-desc">Auto-uses GPT-4o</div></div>
    <div class="suggestion" onclick="useSuggestion('What is the difference between SQL and NoSQL databases?')"><div class="sug-icon">🗄️</div><div class="sug-title">Quick question</div><div class="sug-desc">Auto-uses fastest model</div></div>
  </div>
</div>`;}

function buildMsg(m, idx) {
  const u=m.role==='user';
  const av=u?`<div class="msg-avatar user">${esc((S.userName||'Y')[0].toUpperCase())}</div>`:`<div class="msg-avatar ai">🤖</div>`;
  const modelBadge=(!u && m.model)?`<span class="msg-model-badge">${esc(MODELS[m.model]?.label||m.model)}</span>`:'';
  const body=u?`<div class="msg-body" style="white-space:pre-wrap">${esc(m.content)}</div>`:`<div class="msg-body">${renderMd(m.content)}</div>`;
  const actions=!u?`<div class="msg-actions">
    <button class="action-btn" onclick="quickAction('explain','${escAttr(m.content)}')">💡 Explain more</button>
    <button class="action-btn" onclick="quickAction('example','${escAttr(m.content)}')">📌 Show example</button>
    <button class="action-btn" onclick="quickAction('simplify','${escAttr(m.content)}')">✂️ Simplify</button>
    <button class="action-btn" onclick="copyText('${escAttr(m.content)}')">📋 Copy</button>
  </div>`:'';
  return`<div class="msg-row">${av}<div class="msg-content"><div class="msg-meta"><span class="msg-name ${u?'user':'ai'}">${u?esc(S.userName||'You'):'VenkatS AI HiLO'}</span>${modelBadge}</div>${body}${actions}</div></div>`;
}

function renderMd(txt) {
  marked.setOptions({breaks:true,gfm:true});
  const r=new marked.Renderer();
  r.code=function(code,lang){
    const src=typeof code==='object'?code.text:code;
    const lng=(typeof code==='object'?code.lang:lang)||'plaintext';
    return`<div class="code-block"><div class="code-header"><span class="code-lang">${esc(lng)}</span><button class="btn-copy" onclick="copyCode(this)"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Copy</button></div><pre><code class="language-${esc(lng)}">${esc(src)}</code></pre></div>`;
  };
  return marked.parse(txt,{renderer:r});
}
function copyCode(btn){navigator.clipboard.writeText(btn.closest('.code-block').querySelector('pre').textContent).then(()=>{btn.classList.add('copied');btn.textContent='✓ Copied!';setTimeout(()=>{btn.classList.remove('copied');btn.innerHTML='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Copy';},2000);});}
function copyText(txt){navigator.clipboard.writeText(txt.replace(/\\n/g,'\n')).then(()=>showToast('Copied!','success'));}

/* ═══════════════ QUICK ACTIONS ═══════════════ */
function quickAction(type, prevContent) {
  const prompts = {
    'explain':  'Please explain the previous response in more detail with deeper context.',
    'example':  'Give me a practical, real-world example of what you just explained.',
    'simplify': 'Explain the same thing in much simpler terms, like I\'m a beginner.',
  };
  const inp = document.getElementById('user-input');
  inp.value = prompts[type] || '';
  autoResize(inp); inp.focus();
}

/* ═══════════════ VOICE INPUT ═══════════════ */
let recognition = null;
function toggleVoice() {
  const btn = document.getElementById('voice-btn');
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
    showToast('Voice not supported in this browser', 'error'); return;
  }
  if (recognition && recognition._active) {
    recognition.stop(); return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.continuous = false; recognition.interimResults = true; recognition.lang = 'en-US';
  recognition._active = true;
  btn.classList.add('listening');
  showToast('🎙️ Listening… speak now', '');
  recognition.onresult = (e) => {
    const transcript = Array.from(e.results).map(r=>r[0].transcript).join('');
    document.getElementById('user-input').value = transcript;
    autoResize(document.getElementById('user-input'));
    handleInput(document.getElementById('user-input'));
  };
  recognition.onend = () => { recognition._active=false; btn.classList.remove('listening'); };
  recognition.onerror = () => { recognition._active=false; btn.classList.remove('listening'); showToast('Voice error — try again', 'error'); };
  recognition.start();
}

/* ═══════════════ SEND ═══════════════ */
async function sendMessage() {
  if(S.streaming) return;
  const inp=document.getElementById('user-input');
  const txt=inp.value.trim(); if(!txt) return;

  // Auto-detect best model
  const {model, why} = detectModel(txt);
  S.currentModel = model;
  updateModeUI(model, why);
  save();

  if(!S.currentId||!S.conversations[S.currentId]){
    const id='c'+Date.now();
    S.conversations[id]={title:'New Conversation',messages:[]};
    S.currentId=id;
  }
  const conv=S.conversations[S.currentId];
  conv.messages.push({role:'user',content:txt});
  if(conv.messages.length===1){
    conv.title=txt.slice(0,54)+(txt.length>54?'…':'');
    document.getElementById('chat-title').textContent=conv.title;
    renderList();
  }
  inp.value=''; autoResize(inp); inp.disabled=true;
  document.getElementById('send-btn').disabled=true;
  document.getElementById('char-count').textContent='0';
  S.streaming=true;

  const box=document.getElementById('messages');
  if(document.getElementById('welcome')) renderMessages();
  else box.insertAdjacentHTML('beforeend',buildMsg({role:'user',content:txt}));

  const tid='T'+Date.now();
  const mInfo=MODELS[model]||MODELS['openai'];
  box.insertAdjacentHTML('beforeend',`<div class="msg-row" id="${tid}"><div class="msg-avatar ai">🤖</div><div class="msg-content"><div class="msg-meta"><span class="msg-name ai">VenkatS AI HiLO</span><span class="msg-model-badge">${mInfo.label}</span></div><div class="msg-body" id="${tid}b"><div class="typing-indicator"><span></span><span></span><span></span></div><span class="thinking-label">Thinking with ${mInfo.label}…</span></div></div></div>`);
  box.scrollTop=box.scrollHeight;

  let full='';
  try {
    // ── Method 1: POST OpenAI-compatible (no streaming, JSON) ──
    try {
      const r=await fetch(API_OPENAI,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model,messages:[{role:'system',content:SYSTEM},...conv.messages],private:true,seed:Math.floor(Math.random()*99999)})
      });
      if(r.ok){
        const ct=r.headers.get('content-type')||'';
        if(ct.includes('application/json')){const j=await r.json();full=j.choices?.[0]?.message?.content||'';}
        else full=await r.text();
      }
    }catch(e){}

    // ── Method 2: GET endpoint fallback ──
    if(!full||!full.trim()){
      const recent=conv.messages.slice(-8);
      const history=recent.slice(0,-1).map(m=>(m.role==='user'?'Human':'Assistant')+': '+m.content).join('\n\n');
      const lastMsg=recent[recent.length-1].content;
      const promptText=history?`${history}\n\nHuman: ${lastMsg}`:lastMsg;
      const params=new URLSearchParams({model,system:SYSTEM.slice(0,600),seed:String(Math.floor(Math.random()*99999)),private:'true',nologo:'true'});
      const getUrl=`${API_GET}${encodeURIComponent(promptText.slice(0,1200))}?${params}`;
      const r2=await fetch(getUrl);
      if(!r2.ok) throw new Error(`AI unavailable (${r2.status}) — please try again`);
      full=await r2.text();
    }

    if(!full||!full.trim()) throw new Error('Empty response — please try again');

    const bel=document.getElementById(tid+'b');
    if(bel){bel.innerHTML=renderMd(full.trim());bel.querySelectorAll('pre code').forEach(b=>hljs.highlightElement(b));}

    // Add quick action buttons
    const msgRow=document.getElementById(tid);
    if(msgRow){const mc=msgRow.querySelector('.msg-content');if(mc&&!mc.querySelector('.msg-actions')){mc.insertAdjacentHTML('beforeend',`<div class="msg-actions"><button class="action-btn" onclick="quickAction('explain')">💡 Explain more</button><button class="action-btn" onclick="quickAction('example')">📌 Show example</button><button class="action-btn" onclick="quickAction('simplify')">✂️ Simplify</button><button class="action-btn" onclick="copyText('${escAttr(full.trim())}')">📋 Copy</button></div>`);}}

    box.scrollTop=box.scrollHeight;
    conv.messages.push({role:'assistant',content:full.trim(),model});
    save();
  }catch(err){
    const b=document.getElementById(tid+'b');
    if(b) b.innerHTML=`<span style="color:#fca5a5">⚠ ${esc(err.message)}</span>`;
    showToast(err.message,'error'); conv.messages.pop(); save();
  }
  S.streaming=false; inp.disabled=false;
  document.getElementById('send-btn').disabled=false; inp.focus();
}

/* ═══════════════ HELPERS ═══════════════ */
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey&&window.innerWidth>680){e.preventDefault();sendMessage();}}
function handleInput(el){
  autoResize(el);
  document.getElementById('char-count').textContent=el.value.length;
  if(el.value.trim().length>2){
    const {model,why}=detectModel(el.value);
    updateModeUI(model,why);
  }
}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,160)+'px';}
function useSuggestion(t){const i=document.getElementById('user-input');i.value=t;handleInput(i);i.focus();}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');}
function escAttr(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'\\n').replace(/"/g,'&quot;').slice(0,300);}
function showToast(msg,type=''){const t=document.getElementById('toast');t.textContent=msg;t.className='show '+type;clearTimeout(t._t);t._t=setTimeout(()=>t.className='',3200);}
function exportChat(){
  const conv=S.currentId&&S.conversations[S.currentId];
  if(!conv?.messages?.length){showToast('No messages to export','error');return;}
  const md=conv.messages.map(m=>`**${m.role==='user'?(S.userName||'You'):'VenkatS AI HiLO'}${m.model?' ['+MODELS[m.model]?.label+']':''}:**\n\n${m.content}`).join('\n\n---\n\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([md],{type:'text/markdown'}));a.download=(conv.title||'chat').replace(/[^a-z0-9]/gi,'_')+'.md';a.click();showToast('Exported!','success');
}
</script>
</body>
</html>
